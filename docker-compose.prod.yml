

services:
  postgres:
    image: postgres:15-alpine
    container_name: network_scanner_db
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner123
      POSTGRES_DB: network_scanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./back_vue/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d network_scanner"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build: ./back_vue
    container_name: network_scanner_api
    expose:
      - "8000"
    env_file:
      - ./back_vue/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./back_vue/.env:/app/.env:ro
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: network_scanner_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-unified.conf:/etc/nginx/conf.d/default.conf:ro
      - ./front/dist:/usr/share/nginx/html:ro  
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge

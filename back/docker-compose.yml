
services:
  postgres:
    image: postgres:15-alpine
    container_name: network_scanner_db
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner123
      POSTGRES_DB: network_scanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d network_scanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: network_scanner_api
    expose:
      - "8000"  # Solo expuesto a nginx, no al host
    env_file:
      - .env
    environment:
      - JWT_SECRET=742db74ff92e1032461cf12d2a641be1317b1acb90f2e0684cdfe13146ea4825
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # Hot reload en desarrollo
      - ./.env:/app/.env:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: network_scanner_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

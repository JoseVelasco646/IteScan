<!doctype html>
<html lang="es" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- SEO Meta Tags -->
  <title>ITEScan</title>
  <meta name="description" content="Herramienta profesional de escaneo de red para análisis de hosts, puertos, detección de SO y vulnerabilidades. ITEScan ofrece escaneo completo de infraestructura de red." />
  <meta name="keywords" content="escáner de red, network scanner, escaneo de puertos, detección SO, análisis de red, seguridad de red" />
  <meta name="author" content="ITEScan" />
  <meta name="theme-color" content="#020408" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Tema Oscuro (por defecto) */
    :root {
      --bg-primary: #020408;
      --bg-secondary: #0f172a;
      --bg-tertiary: #1e293b;
      --bg-card: #0f172a;
      --bg-input: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #334155;
      --accent-primary: #22d3ee;
      --accent-secondary: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    /* Tema Claro */
    html.light {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --bg-card: #ffffff;
      --bg-input: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --accent-primary: #0891b2;
      --accent-secondary: #2563eb;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
    }

    * {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Tipografía */
    .font-display {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
    }

    .font-mono {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .terminal-cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background-color: var(--accent-primary);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
